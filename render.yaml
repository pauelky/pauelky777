services:
  - type: web
    name: savedbot
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: savedbot-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: PORT
        value: "8000"
      - key: BASE_DIR
        value: /data
      - key: AI_APP_HOST
        value: 0.0.0.0
      - key: AI_APP_PORT
        value: "8000"
      - key: TIMEZONE
        value: Europe/Moscow
      - key: TG_API_ID
        sync: false
      - key: TG_API_HASH
        sync: false
      - key: SOO_BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: BOT_USERNAME
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ALERT_CHAT_ID
        sync: false
