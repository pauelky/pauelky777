services:
  savedbot:
    build:
      context: .
      dockerfile: Dockerfile
    image: savedbot:latest
    container_name: savedbot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BASE_DIR: /data
      AI_APP_HOST: 0.0.0.0
      AI_APP_PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    stop_grace_period: 40s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)"]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 40s
